# Railway: deploy THIS folder only (Root Directory = frontend/client)
# Separate from backend — nginx serves static SPA only (no API proxy).
#
# Build-time variables (must be set before/at build):
#   VITE_API_BASE_URL = https://<your-backend>.up.railway.app   (no trailing slash)
#   VITE_GOOGLE_CLIENT_ID = (optional)
# After deploy: add this frontend origin to backend CORS_ALLOWED_ORIGINS + FRONTEND_URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
